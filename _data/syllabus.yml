course_title: "Artificial Intelligence"
term: "Spring 2025"
confidence: medium

description: >-
  The opening lecture defined artificial intelligence broadly as competence
  exhibited by computer systems, rather than narrowly as only current LLM
  usage. The course combined historical AI papers, relational and logic
  programming, grammars, interpreters, program synthesis, staging, neural
  learning, Prolog, search/game-playing, and ASP, with an emphasis on
  integrating these techniques into complete software systems.

motivation: >-
  The course framed the current AI moment as part of a much longer history of
  attempts to formalize reasoning, automate work, and build systems that help
  accomplish human ends. One explicit theme in the early lectures was the "AI
  effect": once a capability becomes routine, people stop calling it AI and
  start calling it ordinary computation.

examples_of_ai_systems:
  - "Search engines"
  - "Recommendation systems"
  - "Chatbots"
  - "Speech recognition and text-to-speech systems"
  - "Deduction and consequence engines"
  - "Decision and optimization systems"

course_objectives:
  - "Explain and use classical AI techniques and algorithms"
  - "Integrate AI tools into practical software pipelines"
  - "Evaluate tradeoffs in AI system design"
  - "Read, internalize, and present classic AI research papers"
  - "Build medium-sized AI software systems using real platforms and APIs"

objectives_by_audience:
  theoretical: >-
    Students should be able to explain and use well-known classical AI
    techniques and apply them in straightforward implementations.
  practical: >-
    Students should be able to understand how AI tools fit into larger
    software pipelines and evaluate tradeoffs among design choices.
  research: >-
    Students should be able to study, digest, and discuss classic AI papers
    coherently.
  programming: >-
    Students should be able to integrate different AI tools, platforms, and
    techniques into a coherent software system.

prerequisites_and_expectations:
  - "Ability to read and internalize research literature"
  - "Ability to design and build medium-sized software systems"
  - "Ability to program against APIs"
  - "Comfort with at least one preferred implementation language across design, debugging, and deployment work"

