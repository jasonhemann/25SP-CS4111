  - title: "Languages, grammars, evaluation, and interpreters"
    confidence: high
  - title: "Program synthesis and staging"
    confidence: high
  - title: "Neural networks, learning, and backpropagation"
    confidence: medium
  - title: "Prolog, DCGs, and declarative debugging"
    confidence: high
  - title: "Minimax and alpha-beta pruning"
    confidence: high
  - title: "ASP and ASP Chef"
    confidence: high

texts_and_materials:
  - title: "The Reasoned Schemer, 2nd edition"
    confidence: high
  - title: "Selected classic AI papers"
    confidence: high
  - title: "Selected Prolog / logic programming videos and notes"
    confidence: high
  - title: "Decision Procedures (selected chapters)"
    confidence: medium

assessments:
  evaluated_coursework:
    - title: "Azure training assignments"
      count: 4
    - title: "Paper presentation"
      count: 1
    - title: "Student presentation evaluations"
      count: 3
    - title: "miniKanren assignments"
      count: 2
    - title: "Prolog assignment"
      count: 1
    - title: "Final project"
      count: 1

  weights:
    final_project: 30
    homeworks: 30
    paper_presentation: 25
    peer_evaluations: 10
    online_trainings: 5
  grading_note: >-
    The final project was explicitly described in the contemporaneous grading
    note as larger than the other assignments because it was the longest and
    most comprehensive assignment in the course.

peer_evaluation_policy:
  summary: >-
    Students were asked to email an evaluation of a peer presentation by the
    end of the afternoon of the following day, covering both the ideas and the
    presentation itself.
  source_path: "lectures/peer-evaluation-instructions.md"
  confidence: high

