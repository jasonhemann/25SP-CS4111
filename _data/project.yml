title: "Final Project"
subtitle: "Spoken-book AI assistant / reader"
assigned: "2025-03-12"
due: "2025-04-30"
presentation_dates:
  - "2025-04-30"
  - "2025-05-05"
confidence: medium

reconstructed_concept:
  summary: >-
    Build a private web application that takes a spoken description of a book,
    turns it into text, decides whether the request is specific enough, asks a
    follow-up question if necessary using the student's own synthesized voice,
    retrieves the target text from a lawful or course-provided backend, safely
    unpacks or normalizes the file, and reads the result aloud in the student's
    own voice.
  notes:
    - "This phrasing is a publication-safe reconstruction."
    - "Your later recollection mentioned an IRC-based retrieval backend; keep that as a private note if needed, but I would not publish it as the public assignment framing."

requirements:
  - "Speech-to-text from microphone input"
  - "Natural-language understanding of an imprecise spoken description"
  - "Clarification question when the request is ambiguous"
  - "Text-to-speech in the student's own voice, or a clear approximation if approved voice cloning is unavailable"
  - "Backend retrieval of a book/text from an authorized corpus or a course-provided mock service"
  - "Sandboxed extraction / conversion of downloaded text artifacts"
  - "Playable audio output of the recovered text"
  - "Deployment using Azure-hosted services or Azure-backed infrastructure"

likely_architecture:
  frontend:
    - "private login-protected website"
    - "microphone capture"
    - "status / clarification UI"
    - "audio playback"
  backend:
    - "speech-to-text"
    - "LLM-based disambiguation / agent logic"
    - "retrieval subsystem"
    - "sandboxed extraction"
    - "text-to-speech / voice synthesis"
  deployment:
    - "Azure app service, Azure functions, containers, or equivalent"

evaluation_focus:
  - "end-to-end integration"
  - "deployment and infrastructure"
  - "clarity of agent behavior"
  - "safe handling of external files"
  - "voice interaction quality"

